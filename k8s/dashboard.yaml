apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: lab14
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: lab14/dashboard:latest
        imagePullPolicy: Never
        env:
        - name: DATA_DIR
          value: "/data"
        ports:
        - containerPort: 8501
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: vacancy-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: vacancy-data
        persistentVolumeClaim:
          claimName: vacancy-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: lab14
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 8501
    targetPort: 8501
    nodePort: 30851
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vacancy-data-pvc
  namespace: lab14
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
