version: "3.9"

services:
  # etcd для координации между экземплярами сборщика (Задание 1)
  etcd:
    image: bitnami/etcd:3.5
    container_name: lab14-etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS — брокер сообщений (Задание 7: потоковая передача вакансий)
  nats:
    image: nats:2.10-alpine
    container_name: lab14-nats
    ports:
      - "4222:4222"   # клиентский порт
      - "8222:8222"   # HTTP мониторинг (/varz, /connz, /subsz)
    command: ["--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Go-сборщик #1 (Задание 1: распределённый сборщик, шарды 1-3)
  collector-1:
    build:
      context: ./src/collector
      dockerfile: Dockerfile
    container_name: lab14-collector-1
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      WORKER_ID: "worker-1"
      FLIGHT_ADDR: ":50051"
      OUTPUT_DIR: "/data"
      WINDOW_SEC: "60"
      BATCH_SIZE: "50"
      MOCK_MODE: "true"          # hh.ru API недоступен без токена; используем генератор
      NATS_URL: "nats://nats:4222"  # Задание 7: публикуем вакансии в NATS
    volumes:
      - vacancy-data:/data
    ports:
      - "50051:50051"
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # Go-сборщик #2 (Задание 1: второй экземпляр, шарды 4-6)
  collector-2:
    build:
      context: ./src/collector
      dockerfile: Dockerfile
    container_name: lab14-collector-2
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      WORKER_ID: "worker-2"
      FLIGHT_ADDR: ":50052"
      OUTPUT_DIR: "/data"
      WINDOW_SEC: "60"
      BATCH_SIZE: "50"
      MOCK_MODE: "true"          # hh.ru API недоступен без токена; используем генератор
      NATS_URL: "nats://nats:4222"  # Задание 7: публикуем вакансии в NATS
    volumes:
      - vacancy-data:/data
    ports:
      - "50052:50052"
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # Python-анализатор (разовый запуск)
  analyzer:
    build:
      context: ./src/analyzer
      dockerfile: Dockerfile
    container_name: lab14-analyzer
    environment:
      DATA_DIR: "/data"
      OUTPUT_DIR: "/output"
    volumes:
      - vacancy-data:/data
      - analysis-output:/output
    depends_on:
      - collector-1
    profiles:
      - analyze

  # NATS sliding window консьюмер (Задание 7: скользящее окно в Python)
  nats-consumer:
    build:
      context: ./src/analyzer
      dockerfile: Dockerfile
    container_name: lab14-nats-consumer
    entrypoint: ["python", "nats_consumer.py"]
    command:
      - "--nats-url"
      - "nats://nats:4222"
      - "--window-sec"
      - "300"
      - "--report-interval"
      - "10"
    depends_on:
      nats:
        condition: service_healthy
      collector-1:
        condition: service_started
    restart: unless-stopped

  # Streamlit-дашборд (Задание 8: веб-дашборд с реальным временем)
  dashboard:
    build:
      context: ./src          # шире чем ./src/dashboard — нужен доступ к analyzer/
      dockerfile: dashboard/Dockerfile
    container_name: lab14-dashboard
    ports:
      - "8501:8501"
    environment:
      DATA_DIR: "/data"
    volumes:
      - vacancy-data:/data
    depends_on:
      - collector-1
    restart: unless-stopped

volumes:
  vacancy-data:
  analysis-output:
